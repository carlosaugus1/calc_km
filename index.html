<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora de Quilometragem</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#00cc99"/>
  <style>
    :root {
      --bg-color: #f0f8ff;
      --text-color: #333;
      --container-bg: #fff;
      --border-color: #00cc99;
      --label-color: #0066cc;
      --result-bg: #e6ffe6;
      --result-color: #006600;
      --historico-bg: #f9f9f9;
      --historico-color: #555;
    }

    body.dark {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --container-bg: #1e1e1e;
      --border-color: #00cc99;
      --label-color: #66ccff;
      --result-bg: #1b3d1b;
      --result-color: #66ff66;
      --historico-bg: #2a2a2a;
      --historico-color: #ccc;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      transition: background-color 0.3s, color 0.3s;
    }

    .container {
      max-width: 500px;
      margin: 100px auto 30px;
      background: var(--container-bg);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      box-sizing: border-box;
    }

    h2 {
      color: var(--label-color);
      text-align: center;
      font-size: 1.5rem;
    }

    label {
      margin-top: 15px;
      display: block;
      color: var(--label-color);
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 2px solid var(--border-color);
      border-radius: 5px;
      background: transparent;
      color: var(--text-color);
      font-size: 1rem;
    }

    .campo-hodometro {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .limpar-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--label-color);
      display: flex;
      align-items: center;
    }

    .limpar-btn svg {
      width: 24px;
      height: 24px;
    }

    #resultado-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 30px;
    }

    #resultado {
      flex: 1;
      background-color: var(--result-bg);
      padding: 20px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 8px;
      color: var(--result-color);
    }

    #copiarResultadoBtn {
      background-color: var(--border-color);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    #historicoBtn, #modoBtn {
      position: fixed;
      top: 10px;
      background-color: transparent;
      border: none;
      color: var(--label-color);
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: underline;
      z-index: 1000;
    }

    #historicoBtn {
      right: 10px;
    }

    #modoBtn {
      left: 10px;
    }

    #historico {
      display: none;
      margin-top: 20px;
      font-size: 0.9rem;
      background: var(--historico-bg);
      padding: 10px;
      border: 1px dashed var(--border-color);
      border-radius: 6px;
      color: var(--historico-color);
    }

    #limparHistoricoBtn {
      margin-top: 10px;
      background: #ff6666;
      color: white;
      border: none;
      padding: 8px 12px;
      font-size: 0.9rem;
      border-radius: 5px;
      cursor: pointer;
    }

    .watermark {
      text-align: center;
      margin-top: 40px;
      color: rgba(0,0,0,0.15);
      font-size: 0.9rem;
    }

    @media (max-width: 400px) {
      input, label {
        font-size: 0.95rem;
      }

      h2 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <button id="modoBtn">Modo Escuro</button>
  <button id="historicoBtn">Ver histórico</button>

  <div class="container">
    <h2>Calculadora de Quilometragem</h2>

    <label for="hodometro">Hodômetro atual (km):</label>
    <div class="campo-hodometro">
      <input type="number" id="hodometro" min="0" step="0.1" placeholder="Ex: 12345.6">
      <button id="limparCamposBtn" class="limpar-btn" title="Limpar hodômetro e litros">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2v6h-6"/>
          <path d="M3 13a9 9 0 0 1 15-6.7L21 8"/>
          <path d="M21 12a9 9 0 1 1-6-8.7"/>
        </svg>
      </button>
    </div>

    <label for="litros">Litros abastecidos:</label>
    <input type="number" id="litros" min="0" step="0.1" placeholder="Ex: 45.0">

    <label for="media">Média de km/l do veículo:</label>
    <input type="number" id="media" min="0" step="0.1" placeholder="Ex: 10.5">

    <div id="resultado-container">
      <div id="resultado">Hodômetro final: 0.0 km</div>
      <button id="copiarResultadoBtn" title="Enviar para Hodômetro">➡️</button>
    </div>

    <div id="historico"></div>
  </div>

  <div class="watermark">By: Carlos A.</div>

  <script>
    const hodometroInput = document.getElementById("hodometro");
    const litrosInput = document.getElementById("litros");
    const mediaInput = document.getElementById("media");
    const resultadoDiv = document.getElementById("resultado");
    const historicoBtn = document.getElementById("historicoBtn");
    const historicoDiv = document.getElementById("historico");
    const modoBtn = document.getElementById("modoBtn");
    const limparCamposBtn = document.getElementById("limparCamposBtn");
    const copiarResultadoBtn = document.getElementById("copiarResultadoBtn");

    let historico = JSON.parse(localStorage.getItem("historico")) || [];

    function formatarNumero(valor) {
      return parseFloat(valor).toFixed(1);
    }

    function salvarHistorico() {
      localStorage.setItem("historico", JSON.stringify(historico));
    }

    function calcular() {
      const hodometro = parseFloat(hodometroInput.value);
      const litros = parseFloat(litrosInput.value);
      const media = parseFloat(mediaInput.value);

      if (isNaN(hodometro) || isNaN(litros) || isNaN(media)) {
        resultadoDiv.textContent = "Preencha todos os campos corretamente.";
        return;
      }

      const kmAdicional = litros * media;
      const resultado = hodometro + kmAdicional;
      const resultadoFormatado = formatarNumero(resultado);

      resultadoDiv.textContent = `Hodômetro final: ${resultadoFormatado} km`;

      historico.push(
        `Hodômetro: ${formatarNumero(hodometro)} + (${formatarNumero(litros)}L × ${formatarNumero(media)}km/L) = ${resultadoFormatado} km`
      );
      salvarHistorico();
    }

    function exibirHistorico() {
      if (historico.length === 0) {
        historicoDiv.innerHTML = "Nenhum cálculo realizado ainda.";
      } else {
        historicoDiv.innerHTML = "<strong>Histórico:</strong><br>" + historico.map(h => `• ${h}`).join("<br>");
        historicoDiv.innerHTML += '<br><button id="limparHistoricoBtn">Limpar histórico</button>';
        document.getElementById("limparHistoricoBtn").addEventListener("click", () => {
          historico = [];
          salvarHistorico();
          historicoDiv.innerHTML = "Histórico limpo.";
        });
      }
    }

    [hodometroInput, litrosInput, mediaInput].forEach(input => {
      input.addEventListener("input", calcular);
    });

    historicoBtn.addEventListener("click", () => {
      exibirHistorico();
      historicoDiv.style.display = historicoDiv.style.display === "none" ? "block" : "none";
    });

    modoBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      modoBtn.textContent = document.body.classList.contains("dark") ? "Modo Claro" : "Modo Escuro";
    });

    limparCamposBtn.addEventListener("click", () => {
      hodometroInput.value = "";
      litrosInput.value = "";
      calcular();
    });

    copiarResultadoBtn.addEventListener("click", () => {
      const resultadoTexto = resultadoDiv.textContent;
      const match = resultadoTexto.match(/([\d.]+) km/);
      if (match) {
        const valor = parseFloat(match[1]);
        hodometroInput.value = valor;
        litrosInput.value = "";
        calcular(); // média permanece
      }
    });

    // PWA: registrar service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => {
        console.log("Service Worker registrado com sucesso.");
      }).catch(error => {
        console.error("Erro ao registrar o Service Worker:", error);
      });
    }
  </script>
</body>
</html>
